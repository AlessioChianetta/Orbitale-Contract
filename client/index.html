<!DOCTYPE html>
<html lang="it" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Disabilita la traduzione automatica del browser: Google Translate e simili
         sostituiscono i nodi di testo con <font>, e React (che si aspetta i propri
         nodi) crasha con "Failed to execute 'insertBefore' on 'Node'" durante il
         rerender. Critico nella pagina di firma cliente, dove un crash blocca
         completamente la firma. La pagina è già in italiano. -->
    <meta name="google" content="notranslate" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>TurboContract</title>
  </head>
  <body class="notranslate" translate="no">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
